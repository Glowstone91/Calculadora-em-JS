<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
    <title>Calculadora 2.0</title>
</head>
<body>
    <div class="container">
        <h1>Calculadora JS</h1>
            <div class="corpo">
                <div class="teclas">
                    <button class="tecla" onclick="pi()">π</button>
                    <button class="tecla" onclick="c()">CE</button>
                    <button class="tecla" onclick="mm()">±</button>
                    <button class="tecla" onclick="pot()">**</button>    
                    <button class="tecla" onclick="sete()">7</button>
                    <button class="tecla" onclick="oito()">8</button>     
                    <button class="tecla" onclick="nove()">9</button>
                    <button class="tecla" onclick="div()">/</button>
                    <button class="tecla" onclick="quatro()">4</button>
                    <button class="tecla" onclick="cinco()">5</button>
                    <button class="tecla" onclick="seis()">6</button>
                    <button class="tecla" onclick="mul()">*</button>
                    <button class="tecla" onclick="um()">1</button>
                    <button class="tecla" onclick="dois()">2</button>         
                    <button class="tecla" onclick="tres()">3</button>
                    <button class="tecla" onclick="sub()">-</button>
                    <button class="tecla" onclick="zero()">0</button>
                    <button class="tecla" onclick="pon()">.</button>
                    <button class="tecla" onclick="igual()">=</button>
                    <button class="tecla" onclick="som()">+</button> 
                        
                </div>
                <div class="resultado">
                    <input type="number" id="res" class="res">
                </div>
            </div>
    </div>

    </footer>

    <script src="script.js"> </script>
</body>

</html>
